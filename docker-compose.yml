version: "3.9"

# ── Divine Pooja Services — Local Development Stack ───────────────────────────
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f        # tail logs
#   docker compose down           # stop and remove containers
#

services:
  # ── Supabase (local) ─────────────────────────────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.1.0.147
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Supabase REST API (PostgREST) ─────────────────────────────────────────────
  supabase-rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-local-dev}
      PGRST_DB_SCHEMA: public
    depends_on:
      supabase-db:
        condition: service_healthy

  # ── Node.js WS Server (consultation backend) ─────────────────────────────────
  ws-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase-rest:3000}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-local-dev}
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s

  # ── Redis (session timers) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s

volumes:
  supabase_db_data:
